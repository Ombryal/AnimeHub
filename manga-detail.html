<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manga Details</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/details-common.css">
    <link rel="stylesheet" href="css/manga-detail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div></div>
    <div class="bg-glow"></div>

    <!-- Banner (smaller, faded) -->
    <div id="det-banner" class="detail-banner"></div>

    <!-- Back button -->
    <button class="back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="container detail-container">
        <div class="detail-header-new">
            <div class="cover-wrapper">
                <img id="det-cover" class="detail-cover" alt="Cover">
            </div>
            <div class="detail-info">
                <h1 id="det-title"></h1>
                <div id="det-status-badge" class="status-badge"></div>
                <div class="list-action">
                    <button id="list-action-btn" class="list-action-btn">ADD TO LIST</button>
                    <a href="#" id="read-btn" class="list-action-btn read-btn" style="margin-top: 8px;">READ</a>
                </div>
            </div>
        </div>

        <!-- Existing content (stats, synopsis, etc.) -->
        <div class="detail-content">
            <div class="section-group">
                <div class="row-header">
                    <h3>Statistics</h3>
                    <i class="fas fa-chart-bar"></i>
                </div>
                <div id="det-stats-grid" class="stats-grid-container"></div>
            </div>

            <div class="glass-card">
                <h3 class="section-label">Synopsis</h3>
                <p id="det-desc"></p>
            </div>

            <div class="glass-card">
                <h3 class="section-label">Romaji Title</h3>
                <p id="romaji-title"></p>
                <h3 class="section-label">Synonyms</h3>
                <p id="synonyms-list"></p>
            </div>

            <div id="relations-section"></div>
            <div id="recommendations-section">
                <h3 class="section-title">Recommended</h3>
                <div class="scroller" id="recommendations-scroll"></div>
            </div>
        </div>
    </div>

    <!-- List Editor Bottom Sheet -->
    <div id="list-editor-sheet" class="bottom-sheet">
        <div class="sheet-overlay" id="close-list-editor"></div>
        <div class="sheet-content">
            <div class="sheet-handle"></div>
            <h4>List Editor</h4>
            <div class="list-editor-body">
                <div class="form-group">
                    <label>STATUS</label>
                    <select id="list-status-select">
                        <option value="CURRENT">Reading</option>
                        <option value="PLANNING">Planning</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="DROPPED">Dropped</option>
                        <option value="PAUSED">Paused</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>PROGRESS</label>
                    <div class="progress-input-group">
                        <button id="progress-minus">-</button>
                        <input type="number" id="list-progress" value="0" min="0">
                        <button id="progress-plus">+</button>
                        <span id="total-chapters"> / 0</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>SCORE</label>
                    <select id="list-score">
                        <option value="0">None</option>
                        <option value="10">10 ★</option>
                        <option value="9">9 ★</option>
                        <option value="8">8 ★</option>
                        <option value="7">7 ★</option>
                        <option value="6">6 ★</option>
                        <option value="5">5 ★</option>
                        <option value="4">4 ★</option>
                        <option value="3">3 ★</option>
                        <option value="2">2 ★</option>
                        <option value="1">1 ★</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>STARTED AT</label>
                    <input type="date" id="list-start-date">
                </div>
                <div class="form-group">
                    <label>COMPLETED AT</label>
                    <input type="date" id="list-completed-date">
                </div>
                <div class="form-group">
                    <label>NOTES</label>
                    <textarea id="list-notes" rows="3"></textarea>
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="list-private">
                    <label for="list-private">Private</label>
                </div>
                <div class="form-group">
                    <label>TOTAL REPEATS</label>
                    <input type="number" id="list-repeat" value="0" min="0">
                </div>
            </div>
            <div class="filter-actions">
                <button id="delete-list-entry" class="btn-secondary">Delete</button>
                <button id="save-list-entry" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Fixed bottom bar (Info, Read, Comments) -->
    <div class="detail-bottom-bar">
        <a href="#" class="bottom-bar-btn active" id="info-bottom-btn">Info</a>
        <a href="#" class="bottom-bar-btn" id="read-bottom-btn">Read</a>
        <a href="#" class="bottom-bar-btn" id="comments-bottom-btn">Comments</a>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/manga-detail.js"></script>
</body>
</html>
