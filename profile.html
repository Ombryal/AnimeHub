<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile - AniStats Pro</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="bg-glow"></div>

    <main class="profile-container">
        <div id="profile-loading" class="loading-spinner">Loading profile...</div>
        <div id="profile-content" style="display: none;">
            <!-- Banner -->
            <div class="profile-banner" id="profile-banner"></div>
            
            <!-- Avatar & Name -->
            <div class="profile-header">
                <img id="profile-avatar" class="profile-avatar" src="" alt="Avatar">
                <div class="profile-info">
                    <h1 id="profile-name"></h1>
                    <div class="profile-badge" id="profile-badge">BRONZE</div>
                </div>
            </div>

            <!-- Main Stats Grid (like the image) -->
            <div class="stats-grid-modern">
                <div class="stat-card-modern">
                    <div class="stat-label">Followers</div>
                    <div class="stat-value" id="followers-modern">0</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Following</div>
                    <div class="stat-value" id="following-modern">0</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Series Completed</div>
                    <div class="stat-value" id="series-completed">0</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Anime</div>
                    <div class="stat-value" id="anime-count-modern">0</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Manga</div>
                    <div class="stat-value" id="manga-count-modern">0</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">WatchPower</div>
                    <div class="stat-value" id="watchpower-modern">0</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Time Invested</div>
                    <div class="stat-value" id="days-watched-modern">0</div>
                    <div class="stat-sub">Days</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Chapters Read</div>
                    <div class="stat-value" id="chapters-read-modern">0</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Volumes Read</div>
                    <div class="stat-value" id="volumes-read-modern">0</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Anime Mean Score</div>
                    <div class="stat-value" id="anime-mean-score-modern">0★</div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-label">Manga Mean Score</div>
                    <div class="stat-value" id="manga-mean-score-modern">0★</div>
                </div>
            </div>

            <!-- Level & XP Section -->
            <div class="level-section">
                <div class="level-header">
                    <span class="level-label">LEVEL</span>
                    <span class="level-number" id="user-level-modern">0</span>
                </div>
                <div class="xp-bar-container">
                    <div class="xp-bar" id="xp-bar" style="width: 0%;"></div>
                </div>
                <div class="xp-text" id="next-rank-xp-modern">0 XP to next rank</div>
            </div>

            <!-- About Me -->
            <div class="about-section">
                <h2>About me</h2>
                <div id="about-text" class="about-text"></div>
            </div>

            <!-- Favourites (horizontal scrollers) -->
            <div class="favourites-section">
                <h2>Favourite Anime</h2>
                <div class="scroller" id="favourite-anime"></div>
                
                <h2>Favourite Manga</h2>
                <div class="scroller" id="favourite-manga"></div>
                
                <h2>Favourite Characters</h2>
                <div class="scroller" id="favourite-characters"></div>
            </div>
        </div>
        <div id="profile-error" style="display: none;" class="error-message"></div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
