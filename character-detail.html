<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Character Details</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/details-common.css">
    <link rel="stylesheet" href="css/character-detail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div></div>
    <div class="bg-glow"></div>

    <div id="det-banner"></div>

    <button class="back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="container">
        <div class="detail-header">
            <img id="det-cover" alt="Character Image">
            <div>
                <h1 id="det-title"></h1>
            </div>
        </div>

        <!-- Statistics grid (personal info) -->
        <div id="det-stats-grid" class="stats-grid-container"></div>

        <!-- Character description -->
        <div class="glass-card">
            <h3 class="section-label">Character Details</h3>
            <p id="det-desc"></p>
        </div>

        <!-- Voice Actors (horizontal scroller) -->
        <div id="voice-actors-section"></div>

        <!-- Roles (media appearances) -->
        <div id="relations-section"></div>

        <!-- Hidden sections -->
        <div id="romaji-synonyms-card" style="display: none;"></div>
        <div id="recommendations-section" style="display: none;"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/character-detail.js"></script>
</body>
</html>
