<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniStats Pro | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--text-dim); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">SYNCING PROFILE...</p>
    </div>

    <div class="bg-glow"></div>

    <div class="container">
        <header style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <p style="color: var(--text-dim); font-size: 0.8rem; font-weight: 600;">Welcome back,</p>
                <h1 id="user-name" style="font-size: 1.6rem; font-weight: 800; letter-spacing: -1px;">Guest</h1>
            </div>
            <img id="user-pfp" src="" class="glass-card" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;">
        </header>

        <div class="glass-card" style="padding: 20px; display: flex; justify-content: space-around; margin-bottom: 35px; text-align: center;">
            <div class="stat">
                <p style="font-size: 0.65rem; color: var(--accent); font-weight: 800; letter-spacing: 1px; margin-bottom: 5px;">ANIME</p>
                <h2 id="ep-count" style="font-size: 1.3rem; font-weight: 800;">0</h2>
                <span style="font-size: 0.6rem; color: var(--text-dim);">Episodes</span>
            </div>
            <div style="width: 1px; background: var(--glass-border); height: 40px; align-self: center;"></div>
            <div class="stat">
                <p style="font-size: 0.65rem; color: var(--primary); font-weight: 800; letter-spacing: 1px; margin-bottom: 5px;">MANGA</p>
                <h2 id="ch-count" style="font-size: 1.3rem; font-weight: 800;">0</h2>
                <span style="font-size: 0.6rem; color: var(--text-dim);">Chapters</span>
            </div>
        </div>

        <div class="section-group">
            <div class="row-header">
                <h3>Currently Watching</h3>
                <i class="fas fa-play" style="font-size: 0.8rem; color: var(--accent);"></i>
            </div>
            <div class="scroller" id="anime-scroll">
                </div>
        </div>

        <div class="section-group" style="margin-top: 25px;">
            <div class="row-header">
                <h3>Currently Reading</h3>
                <i class="fas fa-book-open" style="font-size: 0.8rem; color: var(--primary);"></i>
            </div>
            <div class="scroller" id="manga-scroll">
                </div>
        </div>
    </div>

    <nav class="dock">
        <a href="anime.html" class="nav-link"><i class="fas fa-tv"></i></a>
        <a href="index.html" class="nav-link active"><div class="pill-btn">HOME</div></a>
        <a href="manga.html" class="nav-link"><i class="fas fa-book-open"></i></a>
    </nav>

    <script src="auth.js"></script>
    <script src="home.js"></script>
</body>
</html>
