<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniStats Pro | Home</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--text-dim); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">SYNCING PROFILE...</p>
    </div>

    <div class="bg-glow"></div>

    <div class="container home-container">
        <div class="user-dashboard">
            <div class="profile-top">
                <div class="user-pfp-container">
                    <a href="profile.html" target="_blank">
                        <img src="" id="header-avatar" alt="pfp">
                    </a>
                    <div class="user-text">
                        <p class="greeting">Keep it chill,</p>
                        <h1 id="username-display">Guest</h1>
                    </div>
                </div>
                <button class="search-trigger" id="open-search">
                    <i class="fas fa-search"></i>
                </button>
            </div>

            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-label">Episodes Watched</span>
                    <span class="stat-val" id="ep-stat">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Chapters Read</span>
                    <span class="stat-val" id="ch-stat">0</span>
                </div>
            </div>

            <div class="list-nav-cards">
                <div class="nav-card anime-card" onclick="window.location.href='anime.html'">
                    <span>ANIME LIST</span>
                    <div class="underline"></div>
                </div>
                <div class="nav-card manga-card" onclick="window.location.href='manga.html'">
                    <span>MANGA LIST</span>
                    <div class="underline"></div>
                </div>
            </div>
        </div>

        <div class="section-group">
            <div class="row-header">
                <h3>Currently Watching</h3>
                <i class="fas fa-play" style="font-size: 0.8rem; color: var(--accent);"></i>
            </div>
            <div class="scroller" id="anime-scroll"></div>
        </div>

        <div class="section-group" style="margin-top: 25px;">
            <div class="row-header">
                <h3>Currently Reading</h3>
                <i class="fas fa-book-open" style="font-size: 0.8rem; color: var(--primary);"></i>
            </div>
            <div class="scroller" id="manga-scroll"></div>
        </div>
        
        <div class="section-group" style="margin-top: 25px;">
            <div class="row-header">
                <h3>Recommended</h3>
                <i class="fas fa-fire" style="font-size: 0.8rem; color: #f43f5e;"></i>
            </div>
            <div class="scroller" id="rec-scroll"></div>
        </div>
    </div>

    <nav class="dock">
        <a href="anime.html" class="nav-link"><i class="fas fa-tv"></i></a>
        <a href="index.html" class="nav-link active"><div class="pill-btn">HOME</div></a>
        <a href="manga.html" class="nav-link"><i class="fas fa-book-open"></i></a>
    </nav>

    <!-- Global Search Bottom Sheet (Category Links) -->
    <div id="search-sheet" class="bottom-sheet">
        <div class="sheet-overlay" id="close-search"></div>
        <div class="sheet-content">
            <div class="sheet-handle"></div>
            <h2 style="margin-bottom: 20px;">Search Categories</h2>
            <div class="filter-vertical">
                <a href="search.html?type=ANIME" class="chip active">Anime</a>
                <a href="search.html?type=MANGA" class="chip">Manga</a>
                <a href="search.html?type=USER" class="chip">Users</a>
                <a href="search.html?type=CHARACTER" class="chip">Characters</a>
                <a href="search.html?type=STAFF" class="chip">Staff</a>
                <a href="search.html?type=STUDIO" class="chip">Studios</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
