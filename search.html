<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search - AniStats Pro</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay" style="display: none;"><div class="spinner"></div></div>
    <div class="bg-glow"></div>

    <div class="container search-container">
        <div class="search-header">
            <button onclick="history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="page-title" id="search-type-title">Search Anime</h1>
            <button id="filter-toggle" class="filter-toggle-btn">
                <i class="fas fa-sliders-h"></i> Filter
            </button>
        </div>

        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
        </div>

        <!-- Filter panel (collapsible) -->
        <div id="filter-panel" class="filter-panel" style="display: none;">
            <h4>Filter</h4>
            <!-- Horizontal row of category buttons -->
            <div class="filter-category-row">
                <button class="category-btn" data-category="source">Source</button>
                <button class="category-btn" data-category="format">Format</button>
                <button class="category-btn" data-category="status">Status</button>
                <button class="category-btn" data-category="season">Season</button>
                <button class="category-btn" data-category="year">Year</button>
            </div>
            <!-- Dynamic panels for each category (initially hidden) -->
            <div id="source-panel" class="category-panel" style="display: none;">
                <div class="filter-options" id="source-options"></div>
            </div>
            <div id="format-panel" class="category-panel" style="display: none;">
                <div class="filter-options" id="format-options"></div>
            </div>
            <div id="status-panel" class="category-panel" style="display: none;">
                <div class="filter-options" id="status-options"></div>
            </div>
            <div id="season-panel" class="category-panel" style="display: none;">
                <div class="filter-options" id="season-options"></div>
            </div>
            <div id="year-panel" class="category-panel" style="display: none;">
                <div class="filter-options year-inputs">
                    <input type="number" id="year-min" placeholder="From" min="1900" max="2100">
                    <input type="number" id="year-max" placeholder="To" min="1900" max="2100">
                </div>
            </div>

            <!-- Genres and Tags sections with Grid button -->
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="genre-options">
                    <h4>Genres</h4>
                    <i class="fas fa-th"></i>
                </div>
                <div id="genre-options" class="filter-options" style="display: none;">
                    <!-- populated by JS -->
                </div>
            </div>
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="tag-options">
                    <h4>Tags</h4>
                    <i class="fas fa-th"></i>
                </div>
                <div id="tag-options" class="filter-options" style="display: none;">
                    <!-- populated by JS -->
                </div>
            </div>

            <div class="filter-actions">
                <button id="apply-filters" class="btn-primary">Apply Filters</button>
                <button id="clear-filters" class="btn-secondary">Clear</button>
            </div>
        </div>

        <!-- Trending section -->
        <div id="trending-section" class="trending-section">
            <h3 class="section-title">Trending</h3>
            <div id="trending-results" class="search-results-grid"></div>
        </div>
        <div id="search-results" class="search-results-grid" style="display: none;"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
