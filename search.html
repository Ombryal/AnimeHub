<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search - AniStats Pro</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay" style="display: none;"><div class="spinner"></div></div>
    <div class="bg-glow"></div>

    <div class="container search-container">
        <div class="search-header">
            <button onclick="history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="page-title" id="search-type-title">Search</h1>
            <button id="filter-toggle" class="filter-toggle-btn">
                <i class="fas fa-sliders-h"></i> Filter
            </button>
        </div>

        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
        </div>

        <!-- Filter panel (collapsible) -->
        <div id="filter-panel" class="filter-panel" style="display: none;">
            <div class="filter-group">
                <h4>Genres</h4>
                <div class="filter-options" id="genre-filters"></div>
            </div>
            <div class="filter-group">
                <h4>Tags</h4>
                <div class="filter-options" id="tag-filters"></div>
            </div>
            <div class="filter-group">
                <h4>Format</h4>
                <div class="filter-options" id="format-filters">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div class="filter-group">
                <h4>Status</h4>
                <div class="filter-options" id="status-filters"></div>
            </div>
            <div class="filter-group">
                <h4>Season</h4>
                <div class="filter-options" id="season-filters"></div>
            </div>
            <div class="filter-group">
                <h4>Year</h4>
                <div class="filter-options" id="year-filters">
                    <input type="number" id="year-min" placeholder="From" min="1900" max="2100">
                    <input type="number" id="year-max" placeholder="To" min="1900" max="2100">
                </div>
            </div>
            <div class="filter-group">
                <h4>Source</h4>
                <div class="filter-options" id="source-filters"></div>
            </div>
            <div class="filter-actions">
                <button id="apply-filters" class="btn-primary">Apply Filters</button>
                <button id="clear-filters" class="btn-secondary">Clear</button>
            </div>
        </div>

        <div id="search-results" class="search-results-grid"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
