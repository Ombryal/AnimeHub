<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search - AniStats Pro</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay" style="display: none;"><div class="spinner"></div></div>
    <div class="bg-glow"></div>

    <div class="container search-container">
        <div class="search-header">
            <button onclick="history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="page-title" id="search-type-title">Search</h1>
            <button id="filter-toggle" class="filter-toggle-btn">
                <i class="fas fa-sliders-h"></i> Filter
            </button>
        </div>

        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
        </div>

        <!-- Filter panel (collapsible) -->
        <div id="filter-panel" class="filter-panel" style="display: none;">
            <!-- Format -->
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="format-options">
                    <h4>Format</h4>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="format-options" class="filter-options" style="display: none;">
                    <!-- populated by JS -->
                </div>
            </div>
            <!-- Status -->
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="status-options">
                    <h4>Status</h4>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="status-options" class="filter-options" style="display: none;">
                    <!-- populated by JS -->
                </div>
            </div>
            <!-- Season -->
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="season-options">
                    <h4>Season</h4>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="season-options" class="filter-options" style="display: none;">
                    <!-- populated by JS -->
                </div>
            </div>
            <!-- Year -->
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="year-options">
                    <h4>Year</h4>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="year-options" class="filter-options year-inputs" style="display: none;">
                    <input type="number" id="year-min" placeholder="From" min="1900" max="2100">
                    <input type="number" id="year-max" placeholder="To" min="1900" max="2100">
                </div>
            </div>
            <!-- Source -->
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="source-options">
                    <h4>Source</h4>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="source-options" class="filter-options" style="display: none;">
                    <!-- populated by JS -->
                </div>
            </div>
            <!-- Genres (at the end) -->
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="genre-options">
                    <h4>Genres</h4>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="genre-options" class="filter-options" style="display: none;">
                    <!-- populated by JS -->
                </div>
            </div>
            <!-- Tags (at the end) -->
            <div class="filter-group collapsible">
                <div class="filter-group-header" data-target="tag-options">
                    <h4>Tags</h4>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="tag-options" class="filter-options" style="display: none;">
                    <!-- populated by JS -->
                </div>
            </div>

            <div class="filter-actions">
                <button id="apply-filters" class="btn-primary">Apply Filters</button>
                <button id="clear-filters" class="btn-secondary">Clear</button>
            </div>
        </div>

        <div id="search-results" class="search-results-grid"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
