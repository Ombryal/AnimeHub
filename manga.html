<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniStats | Manga Discovery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--text-dim); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">LOADING MANGA...</p>
    </div>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="user-dashboard">
            <div class="profile-top">
                <div class="user-pfp-container">
                    <img src="" id="header-avatar" alt="pfp">
                    <div class="user-text">
                        <p class="greeting">Keep it chill,</p>
                        <h1 id="username-display">Guest</h1>
                    </div>
                </div>
                <button class="search-trigger" id="open-search">
                    <i class="fas fa-search"></i>
                </button>
            </div>

            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-label">Episodes Watched</span>
                    <span class="stat-val" id="ep-stat">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Chapters Read</span>
                    <span class="stat-val" id="ch-stat">0</span>
                </div>
            </div>

            <div class="list-nav-cards">
                <div class="nav-card anime-card">
                    <span>ANIME LIST</span>
                    <div class="underline"></div>
                </div>
                <div class="nav-card manga-card">
                    <span>MANGA LIST</span>
                    <div class="underline"></div>
                </div>
            </div>
        </div>

        <div class="hero-wrapper">
            <div class="hero-carousel" id="hero-carousel"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Trending Manga</h3><i class="fas fa-book" style="color: #6366f1;"></i></div>
            <div class="scroller" id="trending-manga"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Trending Manhwa</h3><i class="fas fa-scroll" style="color: #10b981;"></i></div>
            <div class="scroller" id="trending-manhwa"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Trending Novels</h3><i class="fas fa-pen-nib" style="color: #f59e0b;"></i></div>
            <div class="scroller" id="trending-novel"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Top Rated</h3><i class="fas fa-star" style="color: #ffb800;"></i></div>
            <div class="scroller" id="top-rated"></div>
        </div>

        <div class="section-group">
            <div class="row-header"><h3>Most Favorite</h3><i class="fas fa-heart" style="color: #ef4444;"></i></div>
            <div class="scroller" id="most-favorite"></div>
        </div>

        <div class="section-group" style="margin-top: 10px;">
            <div class="row-header"><h3>Popular All-Time</h3></div>
            <div id="popular-vertical-list"></div>
        </div>
    </div>

    <nav class="dock">
        <a href="manga.html" class="nav-link active"><div class="pill-btn">MANGA</div></a>
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
        <a href="anime.html" class="nav-link"><i class="fas fa-tv"></i></a>
    </nav>

    <div id="search-sheet" class="bottom-sheet">
        <div class="sheet-overlay" id="close-search"></div>
        <div class="sheet-content">
            <div class="sheet-handle"></div>
            <h2 style="margin-bottom: 15px;">Search</h2>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="global-search-input" placeholder="Search anime, manga, users...">
            </div>
            <div class="filter-row">
                <button class="chip active">Anime</button>
                <button class="chip">Manga</button>
                <button class="chip">Users</button>
                <button class="chip">Characters</button>
                <button class="chip">Staff</button>
                <button class="chip">Studios</button>
            </div>
            <div id="search-results" class="results-container"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="manga.js"></script>
</body>
</html>
